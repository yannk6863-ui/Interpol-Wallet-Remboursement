<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Connexion — INTERPOL WALLET REMBOURSEMENT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <style>
    .loginPage{
      min-height:100vh;
      display:grid;
      place-items:center;
      padding:20px;
    }
    .loginCard{
      width:min(100%, 420px);
    }
    .loginBrand{
      display:flex;
      align-items:center;
      gap:12px;
      margin-bottom:14px;
    }
    .loginLogo{
      width:44px;
      height:44px;
      border-radius:14px;
      overflow:hidden;
      border:1px solid var(--border);
    }
    .loginLogo img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .loginTitle{font-size:20px; font-weight:800; margin:0;}
    .loginSub{margin:4px 0 0;}
    .loginForm{display:flex; flex-direction:column; gap:12px; margin-top:12px;}
    .loginFooter{margin-top:12px; text-align:center;}
    .loginError{color:#ff9fb2; min-height:18px; margin:0;}
  </style>
</head>
<body>
  <main class="loginPage">
    <section class="card cardPad loginCard">
      <div class="loginBrand">
        <div class="loginLogo" aria-hidden="true">
          <img src="images.jfif" alt="Logo" />
        </div>
        <div>
          <p class="loginTitle">Connexion</p>
          <p class="muted small loginSub">Accédez à votre espace sécurisé.</p>
        </div>
      </div>

      <form id="loginForm" class="loginForm">
        <div class="formRow">
          <label for="username">Nom d'utilisateur</label>
          <input id="username" type="text" placeholder="Votre nom d'utilisateur" value="" required />
        </div>

        <div class="formRow">
          <label for="password">Mot de passe</label>
          <input id="password" type="password" placeholder="••••••••" value="" required />
        </div>

        <p id="loginError" class="small loginError" aria-live="polite"></p>

        <button class="primaryBtn" type="submit">Se connecter</button>
      </form>

      <p class="muted small loginFooter"></p>
    </section>
  </main>

  <script>
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const allowedUsername = 'Lineproulx';
    const allowedPassword = 'Line1945';

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        errorEl.textContent = 'Veuillez renseigner le nom d\'utilisateur et le mot de passe.';
        return;
      }
      if (username !== allowedUsername || password !== allowedPassword) {
        errorEl.textContent = 'Nom d\'utilisateur ou mot de passe incorrect.';
        return;
      }
      errorEl.textContent = '';
      window.location.href = './INTERPOL WALLET REMBOURSEMENT.html';
    });
  </script>
</body>
</html>
